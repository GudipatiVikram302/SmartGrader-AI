{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Sign Up for SmartGrader</h2>
        
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">I am a:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="roleStudent" value="student" checked>
                    <label class="form-check-label" for="roleStudent">
                        Student
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="role" id="roleTeacher" value="teacher">
                    <label class="form-check-label" for="roleTeacher">
                        Teacher
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-success">Sign Up</button>
        </form>
        <p class="mt-3">Already have an account? <a href="{{ url_for('auth.login') }}">Sign In</a></p>
    </div>
</div>
{% endblock %}
